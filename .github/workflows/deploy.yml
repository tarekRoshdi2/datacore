name: 🚀 Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. سحب الكود ──────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. إعداد Node.js ──────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. تثبيت مكتبات الـ Frontend ──────────────────
      - name: 📦 Install Frontend Dependencies
        run: npm ci

      # ── 4. تثبيت مكتبات الـ Backend ───────────────────
      - name: 📦 Install Backend Dependencies
        run: npm ci --prefix server

      # ── 5. بناء الـ Frontend مع المتغيرات البيئية ─────
      - name: 🏗️ Build Frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # ── 6. نشر على Hostinger عبر SSH ──────────────────
      - name: 🚀 Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script: |
            echo "📂 Moving to project directory..."
            cd ~/domains/data.expocore.net/public_html

            echo "⬇️ Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci --production
            npm ci --prefix server --production

            echo "🏗️ Building frontend..."
            export VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}"
            export VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
            npm run build

            echo "♻️ Restarting server..."
            pm2 restart datacore --update-env || pm2 start server/server.js --name datacore

            echo "✅ Deployment complete!"
